name: agrofinance-erp-dev

# ================================================================
# DESENVOLVIMENTO
# Uso: docker compose -f docker-compose.dev.yml up -d
# Sobe apenas a infraestrutura (Postgres, Redis, Adminer).
# A API e o Web rodam localmente com hot reload via pnpm dev.
# ================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: agrofinance_postgres_dev
    environment:
      POSTGRES_USER: agrofinance
      POSTGRES_PASSWORD: agrofinance_dev_password
      POSTGRES_DB: agrofinance_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrofinance -d agrofinance_dev"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agrofinance_redis_dev
    ports:
      - "6379:6379"
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: agrofinance_adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    restart: unless-stopped

  # MinIO — S3 compatível para desenvolvimento local
  # Acesse: http://localhost:9001 (admin/admin12345)
  minio:
    image: minio/minio:latest
    container_name: agrofinance_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_dev_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_dev_data:
    driver: local
  minio_dev_data:
    driver: local
